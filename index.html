<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Irrigation Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f9; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: white; padding: 30px 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; }
        p.instructions { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        input[type="text"] { width: 90%; padding: 15px; font-size: 22px; font-weight: bold; text-align: center; border: 2px solid #ccc; border-radius: 8px; text-transform: uppercase; letter-spacing: 2px; }
        input[type="text"]:focus { outline: none; border-color: #007bff; }
        
        button { background-color: #007bff; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; margin-top: 20px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background-color: #0056b3; }
        
        #status { margin-top: 20px; font-style: italic; font-weight: bold; }
        
        .dashboard { margin-top: 30px; padding: 20px; background: #f8f9fa; border: 2px solid #e9ecef; border-radius: 8px; display: none; }
        .dashboard h3 { margin: 0 0 15px 0; color: #333; }
        .data-row { font-size: 20px; font-weight: bold; color: #333; margin: 12px 0; }
        .label { font-size: 14px; color: #777; font-weight: normal; display: block; margin-bottom: 2px; text-transform: uppercase;}
        
        #lockStatus { padding: 5px 10px; border-radius: 5px; color: white; }
        .safe { background-color: #28a745; }
        .danger { background-color: #dc3545; }
    </style>
</head>
<body>

    <div class="container">
        <h2>System Sync</h2>
        <p class="instructions">Enter the 8-character sync code from your Arduino LCD (e.g., P0W0015L0)</p>

        <input type="text" id="codeInput" placeholder="P0W0015L0" autocomplete="off" maxlength="10">
        <br>
        <button id="submitBtn">Analyze Data</button>
        <p id="status"></p>

        <div class="dashboard" id="resultBoard">
            <h3>System History</h3>
            <div class="data-row"><span class="label">Target Plant:</span> <span id="plantName" style="color:#007bff;">--</span></div>
            <div class="data-row"><span class="label">Total Waterings:</span> <span id="waterCount" style="color:#007bff;">--</span></div>
            <div class="data-row"><span class="label">System Status:</span> <span id="lockStatus">--</span></div>
        </div>
    </div>

    <script>
        const submitBtn = document.getElementById('submitBtn');
        const codeInput = document.getElementById('codeInput');
        const statusTxt = document.getElementById('status');
        const resultBoard = document.getElementById('resultBoard');

        const plantNames = ["Eggplant", "Sili", "Pechay", "Tomato", "Okra"];
        
        // Lockout Dictionary
        const lockCodes = {
            0: { text: "SAFE & CLEAR", class: "safe" },
            1: { text: "RAIN LOCK ACTIVE", class: "danger" },
            2: { text: "HEAT LOCK ACTIVE", class: "danger" },
            3: { text: "STORM ALERT", class: "danger" },
            4: { text: "HARDWARE FAULT", class: "danger" }
        };

        codeInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") { event.preventDefault(); submitBtn.click(); }
        });

        submitBtn.addEventListener('click', () => {
            let rawText = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
            let cleanText = rawText.replace(/O/g, '0');

            if (cleanText === "") {
                statusTxt.innerText = "Please enter a code first."; statusTxt.style.color = "red";
                resultBoard.style.display = "none"; return;
            }

            // Regex now looks for P[num] W[num] L[num]
            const regex = /P(\d+)W(\d+)L(\d+)/;
            const match = cleanText.match(regex);

            if (match) {
                const plantId = parseInt(match[1]);
                const waterings = parseInt(match[2]);
                const lockId = parseInt(match[3]);

                document.getElementById('plantName').innerText = plantNames[plantId] || "Unknown";
                document.getElementById('waterCount').innerText = waterings;
                
                // Update Lockout UI
                const lockUI = document.getElementById('lockStatus');
                const lockData = lockCodes[lockId] || { text: "UNKNOWN ERROR", class: "danger" };
                lockUI.innerText = lockData.text;
                lockUI.className = lockData.class; // Applies green or red background

                statusTxt.innerText = "Data Synced Successfully!"; statusTxt.style.color = "green";
                resultBoard.style.display = "block";
            } else {
                statusTxt.innerText = "Invalid format. Expected format: P0W0015L0"; statusTxt.style.color = "red";
                resultBoard.style.display = "none";
            }
        });
    </script>
</body>
</html>
